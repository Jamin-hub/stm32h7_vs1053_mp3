version: "4.1"
name: MP3
type: ARM
deviceName: null
packDir: null
srcDirs:
  - Core
  - FATFS
  - Middlewares
  - Drivers
  - User
virtualFolder:
  name: <virtual_root>
  files: []
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 0d428cc0429b80303d02f7c9410cb385
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - DEBUG
        - USE_PWR_LDO_SUPPLY
        - USE_HAL_DRIVER
        - STM32H743xx
      incList:
        - Core/Inc
        - FATFS/Target
        - FATFS/App
        - Drivers/STM32H7xx_HAL_Driver/Inc
        - Drivers/STM32H7xx_HAL_Driver/Inc/Legacy
        - Middlewares/Third_Party/FreeRTOS/Source/include
        - Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
        - Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM4F
        - Drivers/CMSIS/RTOS2/Include
        - Middlewares/Third_Party/FatFs/src
        - Drivers/CMSIS/Device/ST/STM32H7xx/Include
        - Drivers/CMSIS/Include
        - User/Inc
        - Middlewares/LVGL
        - Middlewares/LVGL/porting
        - Middlewares/LVGL/demos
      libList: []
    excludeList: []
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M7
        floatingPointHardware: single
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: -DDEBUG
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            misc-control: []
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: ""
            LIB_FLAGS: ""
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: STM32H743VITX_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: stlink
        target: stm32h7x
    uploader: OpenOCD
  Release:
    cppPreprocessAttrs:
      defineList:
        - USE_PWR_LDO_SUPPLY
        - USE_HAL_DRIVER
        - STM32H743xx
      incList:
        - Core/Inc
        - FATFS/Target
        - FATFS/App
        - Drivers/STM32H7xx_HAL_Driver/Inc
        - Drivers/STM32H7xx_HAL_Driver/Inc/Legacy
        - Middlewares/Third_Party/FreeRTOS/Source/include
        - Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
        - Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM4F
        - Drivers/CMSIS/RTOS2/Include
        - Middlewares/Third_Party/FatFs/src
        - Drivers/CMSIS/Device/ST/STM32H7xx/Include
        - Drivers/CMSIS/Include
      libList: []
    excludeList: []
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M7
        floatingPointHardware: single
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: ""
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            misc-control: []
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: ""
            LIB_FLAGS: ""
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: STM32H743VITX_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
